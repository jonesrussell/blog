<script>
(function () {
  // Header scroll detection — toggle .scrolled class
  var header = document.querySelector('.header');
  if (header) {
    window.addEventListener('scroll', function () {
      header.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });
  }

  // Intersection Observer for staggered post entry animation
  var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReducedMotion) return;

  var entries = document.querySelectorAll('.post-entry:nth-child(n+7)');
  if (!entries.length) return;

  var observer = new IntersectionObserver(function (items) {
    items.forEach(function (item) {
      if (item.isIntersecting) {
        item.target.classList.add('in-view');
        observer.unobserve(item.target);
      }
    });
  }, { threshold: 0.1 });

  entries.forEach(function (entry) { observer.observe(entry); });
})();
</script>

<script>
(function () {
  var containers = document.querySelectorAll('.tabs');
  containers.forEach(function (container) {
    var panes = container.querySelectorAll('.tab-pane');
    if (!panes.length) return;

    // Build tab nav
    var nav = document.createElement('div');
    nav.className = 'tabs-nav';
    nav.setAttribute('role', 'tablist');

    panes.forEach(function (pane, i) {
      var btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
      btn.textContent = pane.getAttribute('data-tab-title') || 'Tab ' + (i + 1);
      btn.addEventListener('click', function () {
        nav.querySelectorAll('.tab-btn').forEach(function (b) {
          b.classList.remove('active');
          b.setAttribute('aria-selected', 'false');
        });
        panes.forEach(function (p) { p.classList.remove('active'); });
        btn.classList.add('active');
        btn.setAttribute('aria-selected', 'true');
        pane.classList.add('active');
      });
      nav.appendChild(btn);
    });

    // Insert nav before tabs-content
    var content = container.querySelector('.tabs-content');
    container.insertBefore(nav, content);

    // Activate first tab
    panes[0].classList.add('active');
  });
})();
</script>
