<script>
(function () {
  // Header scroll detection — toggle .scrolled class
  var header = document.querySelector('.header');
  if (header) {
    window.addEventListener('scroll', function () {
      header.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });
  }

  // Intersection Observer for staggered post entry animation
  var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReducedMotion) return;

  var entries = document.querySelectorAll('.post-entry:nth-child(n+7)');
  if (!entries.length) return;

  var observer = new IntersectionObserver(function (items) {
    items.forEach(function (item) {
      if (item.isIntersecting) {
        item.target.classList.add('in-view');
        observer.unobserve(item.target);
      }
    });
  }, { threshold: 0.1 });

  entries.forEach(function (entry) { observer.observe(entry); });
})();
</script>
<script>
if (document.querySelector('pre.mermaid')) {
  var style = document.createElement('style');
  style.textContent = 'pre.mermaid { background: none; border: none; padding: 0; margin: 1em 0; overflow-x: auto; max-width: 100%; text-align: center; } pre.mermaid svg { max-width: 100%; height: auto; display: inline-block; }';
  document.head.appendChild(style);
  var s = document.createElement('script');
  s.type = 'module';
  s.textContent = "import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs'; mermaid.initialize({ startOnLoad: true, theme: document.body.classList.contains('dark') ? 'dark' : 'default' });";
  document.body.appendChild(s);
}
</script>
