<script>
(function () {
  // Header scroll detection — toggle .scrolled class
  var header = document.querySelector('.header');
  if (header) {
    window.addEventListener('scroll', function () {
      header.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });
  }

  // Intersection Observer for staggered post entry animation
  var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReducedMotion) return;

  var entries = document.querySelectorAll('.post-entry:nth-child(n+7)');
  if (!entries.length) return;

  var observer = new IntersectionObserver(function (items) {
    items.forEach(function (item) {
      if (item.isIntersecting) {
        item.target.classList.add('in-view');
        observer.unobserve(item.target);
      }
    });
  }, { threshold: 0.1 });

  entries.forEach(function (entry) { observer.observe(entry); });
})();
</script>
<script>
if (document.querySelector('pre.mermaid')) {
  var style = document.createElement('style');
  style.textContent = 'pre.mermaid { background: none; border: none; padding: 0; margin: 1em 0; overflow-x: auto; max-width: 100%; text-align: center; } pre.mermaid svg { max-width: 100%; height: auto; display: inline-block; }';
  document.head.appendChild(style);
  var s = document.createElement('script');
  s.type = 'module';
  s.textContent = [
    "import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';",
    "function isDark() {",
    "  return document.documentElement.classList.contains('dark') ||",
    "         document.body.classList.contains('dark') ||",
    "         (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);",
    "}",
    "function renderMermaid() {",
    "  mermaid.initialize({ startOnLoad: false, theme: isDark() ? 'dark' : 'default' });",
    "  document.querySelectorAll('pre.mermaid').forEach(function (el) {",
    "    if (!el.dataset.source) { el.dataset.source = el.textContent; }",
    "    el.removeAttribute('data-processed');",
    "    el.innerHTML = el.dataset.source;",
    "  });",
    "  mermaid.run({ querySelector: 'pre.mermaid' });",
    "}",
    "renderMermaid();",
    "var lastDark = isDark();",
    "var observer = new MutationObserver(function () {",
    "  var nowDark = isDark();",
    "  if (nowDark !== lastDark) { lastDark = nowDark; renderMermaid(); }",
    "});",
    "observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });",
    "observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });",
    "if (window.matchMedia) {",
    "  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {",
    "    var nowDark = isDark();",
    "    if (nowDark !== lastDark) { lastDark = nowDark; renderMermaid(); }",
    "  });",
    "}"
  ].join('\n');
  document.body.appendChild(s);
}
</script>
