{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ .Title | jsonify }},
  "datePublished": {{ .Date.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "description": {{ with .Params.summary }}{{ . | jsonify }}{{ else }}{{ .Summary | plainify | jsonify }}{{ end }},
  "url": {{ .Permalink | jsonify }},
  "author": {
    "@type": "Person",
    "name": {{ .Site.Params.author | jsonify }}
  },
  "publisher": {
    "@type": "Organization",
    "name": {{ .Site.Title | jsonify }},
    "url": {{ .Site.BaseURL | jsonify }}
  }
}
</script>
{{ end }}

<style>.terms-heading { font-size: 1.1rem; margin-bottom: 0.5em; }
.guest-author { margin: 2rem 0 1rem; padding: 1.25rem 1.5rem; border: 1px solid var(--border); border-radius: 4px; }
.guest-author-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--secondary); margin: 0 0 0.25rem; }
.guest-author-name { font-size: 1rem; font-weight: 600; }
.guest-author-bio { font-size: 0.9rem; margin: 0.5rem 0 0.75rem; color: var(--secondary); }
.guest-author-links { display: flex; gap: 1rem; font-size: 0.85rem; }
.guest-author-links a { color: var(--primary); text-decoration: none; }
.guest-author-links a:hover { text-decoration: underline; }
section[aria-labelledby] + section[aria-labelledby] { margin-top: 1.5rem; }
.content-status-notice { margin: 0.75rem 0; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 4px; }
.content-status-notice p { margin: 0; font-size: 0.9rem; }</style>

<!-- Google Fonts: Bricolage Grotesque (headings), Instrument Sans (body), JetBrains Mono (code) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
