{{- $related := .Site.RegularPages.Related . | first 3 }}
{{- with $related }}
<div class="related-posts">
  <h2>Related Posts</h2>
  <ul class="post-tags">
    {{- range . }}
    <li class="related-post-entry">
      <a href="{{ .Permalink }}">
        <span class="related-post-title">{{ .Title }}</span>
        <time class="related-post-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
        {{- if .Summary }}
        <span class="related-post-summary">{{ .Summary | plainify | truncate 120 }}</span>
        {{- end }}
      </a>
    </li>
    {{- end }}
  </ul>
</div>
{{- end }}
