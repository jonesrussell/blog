{{ $type := .Get "type" | default "info" }}
<div class="callout callout-{{ $type }}">
  <div class="callout-title">
    {{ if eq $type "warning" }}⚠️ Warning
    {{ else if eq $type "tip" }}💡 Tip
    {{ else if eq $type "note" }}📝 Note
    {{ else }}ℹ️ Info{{ end }}
  </div>
  <div class="callout-content">
    {{ .Inner | markdownify }}
  </div>
</div>
