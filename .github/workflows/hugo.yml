# Workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo blog to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  HUGO_ENV: production

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium (best-effort)
        # The browser download can hang for many minutes AFTER reaching 100% on
        # GitHub runners (a known Playwright-on-CI post-download/extraction stall
        # that caused multi-hour cancellations). OG images are committed to the
        # repo and generated incrementally, so this is best-effort: the timeout
        # caps any hang and a failure never blocks the deploy.
        run: timeout 90 npx playwright install chromium || echo "Playwright install skipped; using committed OG images"

      - name: Generate OG images
        # Non-fatal: committed OG images already cover published posts, so a
        # missing browser (see best-effort install above) must not fail the build.
        run: node scripts/generate-og-images.js || echo "OG generation skipped (browser unavailable); using committed images"

      - name: Build with Hugo
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./public"

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
