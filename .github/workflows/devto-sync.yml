name: Sync to Dev.to

on:
  workflow_run:
    workflows: ["Deploy Hugo blog to Pages"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'tools/devto-sync/go.mod'

      - name: Build devto-sync
        run: cd tools/devto-sync && go build -o ../../bin/devto-sync .

      - name: Find changed posts
        id: changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha="${{ github.event.workflow_run.head_sha }}"
          # Find the previous deploy by looking at the last successful
          # workflow_run before this one. Fall back to diffing the full
          # push range if unavailable.
          prev_sha=$(gh run list \
            --workflow "Deploy Hugo blog to Pages" \
            --status success \
            --json headSha \
            --limit 2 \
            -q '.[1].headSha // empty' 2>/dev/null || true)
          if [ -n "$prev_sha" ] && git cat-file -t "$prev_sha" >/dev/null 2>&1; then
            echo "Diffing $prev_sha..$sha"
            files=$(git diff --name-only "$prev_sha" "$sha" -- 'content/posts/**/index.md' 2>/dev/null || true)
          else
            echo "No previous deploy SHA found, diffing against parent"
            files=$(git diff --name-only "${sha}^1" "${sha}" -- 'content/posts/**/index.md' 2>/dev/null || true)
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          count=$(echo "$files" | grep -c . || true)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Push changed posts to Dev.to
        if: steps.changed.outputs.count != '0'
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
            slug=$(basename "$(dirname "$file")")
            echo "Pushing: $slug"
            ./bin/devto-sync push --slug "$slug" || echo "WARN: failed to push $slug"
          done <<< "${{ steps.changed.outputs.files }}"

      - name: Check for devto_id writebacks
        id: writeback
        run: |
          changes=$(git diff --name-only -- 'content/posts/**/index.md' || true)
          echo "changes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changes" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$changes" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit writeback to main
        if: steps.writeback.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $(git diff --name-only -- 'content/posts/')
          git commit -m "chore: write back devto_id from sync run"
          git push origin HEAD:main
