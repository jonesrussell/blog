name: Publish to dev.to

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**/*.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Find changed posts
        id: changed
        run: |
          files=$(git diff --name-only HEAD~1 HEAD -- 'content/posts/**/*.md' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Publish to dev.to
        if: steps.changed.outputs.files != ''
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          BASE_URL: https://jonesrussell.github.io/blog
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            # Extract frontmatter
            frontmatter=$(sed -n '/^---$/,/^---$/p' "$file" | sed '1d;$d')

            # Check devto: true and draft: false
            devto=$(echo "$frontmatter" | grep -E '^devto:\s*true' || true)
            draft=$(echo "$frontmatter" | grep -E '^draft:\s*true' || true)

            if [ -z "$devto" ] || [ -n "$draft" ]; then
              echo "Skipping $file (devto=$devto, draft=$draft)"
              continue
            fi

            # Parse frontmatter fields
            title=$(echo "$frontmatter" | grep -E '^title:' | sed 's/^title:\s*"\?\(.*\)"\?$/\1/' | sed 's/"$//')
            slug=$(echo "$frontmatter" | grep -E '^slug:' | sed 's/^slug:\s*"\?\(.*\)"\?$/\1/' | sed 's/"$//')
            summary=$(echo "$frontmatter" | grep -E '^summary:' | sed 's/^summary:\s*"\?\(.*\)"\?$/\1/' | sed 's/"$//')
            tags=$(echo "$frontmatter" | grep -E '^tags:' | sed 's/^tags:\s*\[//;s/\]$//' | tr -d '"' | tr -d ' ')
            series=$(echo "$frontmatter" | grep -E '^series:' | sed 's/^series:\s*\[//;s/\]$//' | tr -d '"' | tr -d ' ')

            canonical_url="${BASE_URL}/${slug}/"

            # Extract body (everything after second ---)
            body=$(sed '1,/^---$/d' "$file" | sed '1,/^---$/d')

            # Check if article already exists by canonical URL
            existing=$(curl -s -H "api-key: $DEVTO_API_KEY" \
              "https://dev.to/api/articles/me?per_page=100" | \
              jq -r --arg url "$canonical_url" '.[] | select(.canonical_url == $url) | .id')

            # Build JSON payload
            payload=$(jq -n \
              --arg title "$title" \
              --arg body "$body" \
              --arg canonical_url "$canonical_url" \
              --arg description "$summary" \
              --arg tags "$tags" \
              --arg series "$series" \
              '{
                article: {
                  title: $title,
                  body_markdown: $body,
                  canonical_url: $canonical_url,
                  description: $description,
                  published: true,
                  tags: ($tags | split(",")),
                  series: (if $series != "" then $series else null end)
                }
              }')

            if [ -n "$existing" ]; then
              echo "Updating article $existing for $slug"
              curl -s -X PUT "https://dev.to/api/articles/$existing" \
                -H "api-key: $DEVTO_API_KEY" \
                -H "Content-Type: application/json" \
                -d "$payload" | jq '{id, url, title}'
            else
              echo "Creating article for $slug"
              curl -s -X POST "https://dev.to/api/articles" \
                -H "api-key: $DEVTO_API_KEY" \
                -H "Content-Type: application/json" \
                -d "$payload" | jq '{id, url, title}'
            fi

          done <<< "${{ steps.changed.outputs.files }}"
