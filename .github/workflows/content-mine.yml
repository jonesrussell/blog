name: Content Mining

on:
  schedule:
    # Daily at 11:00 UTC (7:00 AM ET)
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back'
        required: false
        default: '7'
      confidence_threshold:
        description: 'Minimum confidence score (0.0-1.0) for creating issues'
        required: false
        default: '0.3'

permissions:
  contents: read
  issues: write

jobs:
  mine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run git activity mining
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          THRESHOLD="${{ github.event.inputs.confidence_threshold || '0.3' }}"
          bash scripts/mine-git-activity.sh "$DAYS" "$THRESHOLD"
