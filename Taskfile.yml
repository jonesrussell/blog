version: '3'

vars:
  HUGO_ENV: '{{.HUGO_ENV | default "development"}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  serve:
    desc: Start development server with live reload and drafts
    cmds:
      - hugo server -D --navigateToChanged

  serve:prod:
    desc: Start server in production mode (no drafts)
    cmds:
      - hugo server --navigateToChanged

  build:
    desc: Build site for production
    cmds:
      - hugo --gc --minify
    env:
      HUGO_ENV: production

  build:drafts:
    desc: Build site including drafts
    cmds:
      - hugo --gc --minify -D

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf public/
      - rm -rf resources/_gen/
      - rm -f .hugo_build.lock

  new-post:
    desc: Create a new blog post
    cmds:
      - hugo new content/posts/{{.CLI_ARGS}}/index.md
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task new-post -- my-post-title"

  audit-posts:
    desc: Audit posts and write content-todo suggestions (use DRY_RUN=true to print only)
    cmds:
      - python3 scripts/audit-posts.py

  stats:
    desc: Show site statistics
    cmds:
      - |
        echo "=== Site Statistics ==="
        echo "Published posts: $(find content/posts -name '*.md' -exec grep -L 'draft: true' {} \; | wc -l)"
        echo "Draft posts: $(find content/posts -name '*.md' -exec grep -l 'draft: true' {} \; | wc -l)"
        echo "Total posts: $(find content/posts -name '*.md' | wc -l)"
        echo "Categories: $(find public/categories -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)"
        echo "Tags: $(find public/tags -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)"

  check:
    desc: Check for common issues
    cmds:
      - hugo --gc --minify --printPathWarnings

  theme:update:
    desc: Update PaperMod theme to latest version
    cmds:
      - cd themes/PaperMod && git pull origin master

  setup:
    desc: Set up git hooks
    cmds:
      - git config core.hooksPath .husky

  og:generate:
    desc: Generate OG images for posts missing them (incremental)
    cmds:
      - node scripts/generate-og-images.js

  og:regenerate:
    desc: Force regenerate all OG images
    cmds:
      - node scripts/generate-og-images.js --force

  deploy:
    desc: Build and prepare for deployment
    deps:
      - clean
    cmds:
      - hugo --gc --minify
      - echo "Site built successfully in public/"
    env:
      HUGO_ENV: production

  devto:build:
    desc: Build the devto-sync tool
    dir: tools/devto-sync
    cmds:
      - go build -o ../../bin/devto-sync .
    sources:
      - "**/*.go"
      - go.mod
    generates:
      - ../../bin/devto-sync

  devto:push:
    desc: Push posts to Dev.to (use SLUG=xxx for single post, or ALL=true for all)
    deps: [devto:build]
    cmds:
      - |
        args=""
        {{ if .SLUG }}args="--slug {{.SLUG}}"{{ end }}
        {{ if .ALL }}args="--all"{{ end }}
        {{ if .DRY_RUN }}args="$args --dry-run"{{ end }}
        ./bin/devto-sync push $args

  devto:pull:
    desc: Import from Dev.to (use ID=xxx or ALL=true with CATEGORY_MAP=file.csv)
    deps: [devto:build]
    cmds:
      - |
        args=""
        {{ if .ID }}args="--id {{.ID}} --category {{.CATEGORY}}"{{ end }}
        {{ if .ALL }}args="--all"{{ end }}
        {{ if .CATEGORY_MAP }}args="$args --category-map {{.CATEGORY_MAP}}"{{ end }}
        {{ if .DRY_RUN }}args="$args --dry-run"{{ end }}
        ./bin/devto-sync pull $args

  devto:status:
    desc: Show sync state between blog and Dev.to
    deps: [devto:build]
    cmds:
      - ./bin/devto-sync status

  devto:triage:
    desc: Propose archive/update/replace for imported posts
    deps: [devto:build]
    cmds:
      - ./bin/devto-sync triage

  devto:env:
    desc: Export DEVTO_API_KEY from Ansible vault (run with 'eval $(task devto:env)')
    cmds:
      - echo "export DEVTO_API_KEY=$(ansible-vault decrypt --output - vault/devto-api-key.yml 2>/dev/null | grep api_key | cut -d' ' -f2)"
    silent: true

  devto:test:
    desc: Run devto-sync tests
    dir: tools/devto-sync
    cmds:
      - go test ./... -v
